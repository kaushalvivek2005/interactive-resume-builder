<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Resume Builder</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Interactive Resume Builder</h1>
        <p>Create your professional resume instantly.</p>
    </header>

    <main class="container">

        <!-- =========================
             LEFT SIDE : FORM
        ========================== -->

        <section class="form-section">

            <h2>Personal Information</h2>

            <form id="resumeForm">

                <!-- Name -->

                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input
                        type="text"
                        id="name"
                        placeholder="Enter your full name"
                    >
                </div>

                <!-- Email -->

                <div class="input-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="example@gmail.com"
                    >
                </div>

                <!-- Phone -->

                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input
                        type="tel"
                        id="phone"
                        placeholder="+91 XXXXXXXXXX"
                    >
                </div>

                <!-- Address -->

                <div class="input-group">
                    <label for="address">Address</label>
                    <textarea
                        id="address"
                        rows="3"
                        placeholder="Your Address"
                    ></textarea>
                </div>

                <!-- Summary -->

                <div class="input-group">
                    <label for="summary">Profile Summary</label>
                    <textarea
                        id="summary"
                        rows="5"
                        placeholder="Write about yourself..."
                    ></textarea>
                </div>

                <!-- Skills -->

                <div class="input-group">
                    <label for="skills">Skills</label>
                    <input
                        type="text"
                        id="skills"
                        placeholder="HTML, CSS, JavaScript"
                    >
                </div>

            </form>

            <!-- =========================
                 EDUCATION
            ========================== -->

            <section class="education-section">

                <div class="section-title">
                    <h2>Education</h2>

                    <button
                        type="button"
                        id="addEducation"
                    >
                        + Add Education
                    </button>

                </div>

                <div id="educationContainer">

                </div>

            </section>

            <!-- =========================
                 EXPERIENCE
            ========================== -->

            <section class="experience-section">

                <div class="section-title">

                    <h2>Experience</h2>

                    <button
                        type="button"
                        id="addExperience"
                    >
                        + Add Experience
                    </button>

                </div>

                <div id="experienceContainer">

                </div>

            </section>

            <!-- Buttons -->

            <div class="buttons">

                <button
                    type="button"
                    id="clearBtn"
                >
                    Clear Form
                </button>

                <button
                    type="button"
                    id="downloadBtn"
                >
                    download PDF
                </button>

            </div>

        </section>

        <!-- ==========================
             RIGHT SIDE : LIVE PREVIEW
        =========================== -->

        <section class="preview-section">

            <div class="resume">

                <h1 id="previewName">
                    Your Name
                </h1>

                <p id="previewEmail">
                    Email
                </p>

                <p id="previewPhone">
                    Phone Number
                </p>

                <p id="previewAddress">
                    Address
                </p>

                <hr>

                <h2>Profile Summary</h2>

                <p id="previewSummary">
                    Your summary will appear here...
                </p>

                <hr>

                <h2>Skills</h2>

                <ul id="previewSkills">

                </ul>

                <hr>

                <h2>Education</h2>

                <div id="previewEducation">

                </div>

                <hr>

                <h2>Experience</h2>

                <div id="previewExperience">

                </div>

            </div>

        </section>

    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
